<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inline Demo</title>
    <style>
        /* =========================================
           唯一的原子化 Class
           ========================================= */
        .inline {
            display: inline;
        }
    </style>
</head>
<body style="font-family: sans-serif; background-color: #f3f4f6; padding: 40px; margin: 0;">

<!-- 说明卡片：完全使用内联样式 -->
<div style="max-width: 600px; margin: 0 auto 30px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center;">
    <h1 style="margin: 0 0 10px 0; font-size: 24px; color: #1f2937;">.inline</h1>
    <p style="margin: 0; color: #6b7280; line-height: 1.6; font-size: 15px;">
        <strong>作用：</strong>强制元素表现为<strong>行内元素</strong>。<br>
        <strong>效果：</strong>元素不独占一行，与其他行内元素并排显示，宽度仅由内容决定。<br>
        <span style="font-size: 0.85em; opacity: 0.8;">(即使原本是块级元素如 div，加上此类也会排在同一行)</span>
    </p>
</div>

<!-- 演示区域：三个 div，强制应用 .inline 类，让它们排成一行 -->
<!-- 注意：这里故意用 div 标签，展示 .inline 如何强行把它们变成一行 -->

<div class="inline" style="background-color: #10b981; color: white; padding: 10px 20px; margin-right: 5px; font-weight: 500; border-radius: 4px;">
    Inline 1
</div>

<div class="inline" style="background-color: #10b981; color: white; padding: 10px 20px; margin-right: 5px; font-weight: 500; border-radius: 4px;">
    Inline 2
</div>

<div class="inline" style="background-color: #10b981; color: white; padding: 10px 20px; margin-right: 5px; font-weight: 500; border-radius: 4px;">
    Inline 3
</div>

<div style="clear: both; height: 20px;"></div> <!-- 清除浮动/换行，仅作视觉分隔 -->

<p style="color: #6b7280; font-size: 14px; margin-top: 10px;">
    上图展示了三个原本应该独占一行的 &lt;div&gt; 标签，因为添加了 <code>.inline</code> 类，现在紧密排列在同一行了。
</p>

</body>
</html>
